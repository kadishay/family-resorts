// ── MAP SETUP ────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// ── MARKERS ──────────────────────────────────────────────────────────────────
const bounds = [];
// Add Center Parcs first (renders beneath spa hotels if overlapping)
[...places].sort(a => a.g === 'cp' ? -1 : 1).forEach(p => {
  const color = COLORS[p.g];
  const isCp = p.g === 'cp';
  const marker = L.circleMarker([p.lat, p.lng], {
    radius:      isCp ? 8 : 7,
    fillColor:   color,
    color:       'white',
    weight:      isCp ? 1.5 : 2,
    opacity:     1,
    fillOpacity: isCp ? 0.75 : 0.92,
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-name">${p.name}</div>
    <div class="popup-loc">${p.loc}</div>
    <span class="popup-tag" style="background:${color}">${p.tag}</span>
  `, { maxWidth: 260 });

  bounds.push([p.lat, p.lng]);
});

map.fitBounds(bounds, { padding: [36, 36] });

// ── LEGEND ───────────────────────────────────────────────────────────────────
const counts = {};
places.forEach(p => { counts[p.g] = (counts[p.g] || 0) + 1; });

const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  const spaGroups = ['spa-AT','spa-DE','spa-IT'];
  const spaTotal = spaGroups.reduce((n, g) => n + (counts[g] || 0), 0);

  div.innerHTML = `
    <h4>Family Resorts Map — ${places.length} locations</h4>
    <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Family Spa Resorts (${spaTotal})</div>
    ${spaGroups.map(g => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${COLORS[g]}"></div>
        <span>${g === 'spa-AT' ? 'Austria' : g === 'spa-DE' ? 'Germany' : 'Italy'} <span style="color:#888">(${counts[g] || 0})</span></span>
      </div>`).join('')}
    <hr class="legend-divider">
    <div style="font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Center Parcs (${counts['cp'] || 0})</div>
    <div class="legend-item">
      <div class="legend-dot" style="background:${COLORS['cp']}"></div>
      <span>FR · NL · BE · DE · DK</span>
    </div>
  `;
  return div;
};
legend.addTo(map);
